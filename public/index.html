<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KłamczuchQuiz</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root { --bg:#090910; --card:rgba(26,26,46,0.8); --accent:#ff2a5f; --text:#f0f0f0; --muted:#a0a0b0; --green:#00e676; --yellow:#ffd700; --blue:#00b4d8; }
  * { box-sizing:border-box; margin:0; padding:0; font-family:'Poppins', sans-serif; }
  body { background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
  .screen { display:none; padding:20px; max-width:1200px; margin:0 auto; animation:fadeIn 0.3s; }
  .screen.active { display:flex; flex-direction:column; gap:20px; }
  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
  .card { background:var(--card); border-radius:16px; padding:20px; border:1px solid rgba(255,255,255,0.05); }
  h1 { font-weight:800; text-transform:uppercase; color:var(--accent); }
  .answer-tile { background:rgba(22,33,62,0.6); border-left:4px solid var(--blue); border-radius:8px; padding:12px 18px; margin:8px 0; display:flex; justify-content:space-between; align-items:center; }
  .answer-tile.hidden { border-left-color:#333; opacity:0.5; }
  .pts { color:var(--yellow); font-weight:800; font-size:1.2rem; }
  .timer-bar-wrap { background:rgba(0,0,0,0.5); height:12px; border-radius:6px; overflow:hidden; border:1px solid #333; margin:15px 0; }
  .timer-bar { height:100%; background:var(--accent); width:100%; transition:width 1s linear; }
  #pause-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:9999; }
  input[type=text] { background:rgba(0,0,0,0.4); border:2px solid #333; color:#fff; padding:14px; border-radius:12px; width:100%; }
  button { background:var(--accent); color:#fff; border:none; border-radius:12px; padding:14px 28px; font-weight:600; cursor:pointer; }
  .vote-tile { background:var(--card); padding:15px; border-radius:12px; border:2px solid #333; cursor:pointer; text-align:center; }
  .vote-tile.selected { border-color:var(--accent); background:rgba(255,42,95,0.2); }
  .big-msg { font-size:clamp(2rem, 8vw, 4rem); font-weight:800; text-align:center; margin:20px 0; }
</style>
</head>
<body>
<div id="pause-overlay">
  <h1 style="font-size:5rem;">PAUZA</h1>
  <p>Host wstrzymał grę...</p>
</div>

<div class="screen active" id="screen-join">
  <div class="card" style="max-width:400px; margin:100px auto; text-align:center;">
    <h1>KłamczuchQuiz</h1>
    <input type="text" id="p-name" placeholder="Twoje imię..." style="margin:20px 0;"/>
    <button onclick="joinGame()" style="width:100%;">Graj</button>
  </div>
</div>

<div class="screen" id="screen-game">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h1>Runda <span id="round-num"></span></h1>
    <div id="my-name-display" style="font-weight:bold; color:var(--blue)"></div>
  </div>
  <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:20px;">
    <div class="card">
      <h2 id="question-text">Pytanie...</h2>
      <div id="turn-area" class="big-msg"></div>
      <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar"></div></div>
      <div id="ans-input-area" style="display:none; margin-top:20px;">
        <div style="display:flex; gap:10px;">
          <input type="text" id="ans-in" placeholder="Wpisz odpowiedź..."/>
          <button onclick="sendAns()">Wyślij</button>
        </div>
      </div>
      <div id="reveal-msg" style="text-align:center; font-weight:bold; margin-top:10px;"></div>
    </div>
    <div style="display:flex; flex-direction:column; gap:20px;">
      <div class="card">
        <h3>Odpowiedzi</h3>
        <div id="answers-list"></div>
      </div>
      <div class="card">
        <h3>Ranking</h3>
        <div id="pl-list"></div>
      </div>
    </div>
  </div>
</div>

<div class="screen" id="screen-summary">
  <div class="card" style="text-align:center;">
    <h1>Podsumowanie Rundy</h1>
    <div id="sum-ans-list" style="text-align:left; margin-top:20px;"></div>
    <p id="sum-next-msg" style="margin-top:20px; font-weight:800; color:var(--yellow);"></p>
  </div>
</div>

<div class="screen" id="screen-voting">
  <div class="card" style="text-align:center;">
    <h1 class="big-msg">WSKAŻ KŁAMCZYCHA!</h1>
    <div id="vote-timer" style="font-size:3rem; color:var(--yellow); font-weight:800;">60</div>
    <div id="vote-grid" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:15px; margin-top:20px;"></div>
  </div>
</div>

<div class="screen" id="screen-results">
  <div class="card" style="text-align:center;">
    <h1>Wyniki Głosowania</h1>
    <div id="v-res-list" style="text-align:left; max-width:600px; margin:20px auto;"></div>
  </div>
</div>

<script>
const socket = io();
let myName = '';
function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function joinGame() { const n = document.getElementById('p-name').value.trim(); if(n){ myName = n; socket.emit('joinGame', { name: n }); } }

socket.on('state', s => {
  document.getElementById('pause-overlay').style.display = s.isPaused ? 'flex' : 'none';
  if (s.phase === 'lobby') showScreen('screen-join');
  else if (s.phase === 'round') {
    showScreen('screen-game');
    document.getElementById('round-num').textContent = s.currentRound;
    document.getElementById('question-text').textContent = s.questionText;
    document.getElementById('my-name-display').textContent = myName;
    const turnArea = document.getElementById('turn-area');
    if (s.currentPlayerName === myName) {
      turnArea.innerHTML = `<span style="color:var(--green)">TWOJA KOLEJ!</span>`;
      document.getElementById('ans-input-area').style.display = 'block';
    } else {
      turnArea.innerHTML = `<span style="color:var(--muted); font-size:1.5rem">${s.currentPlayerName} odpowiada...</span>`;
      document.getElementById('ans-input-area').style.display = 'none';
    }
    renderAnswers('answers-list', s.allAnswers, s.revealedAnswers);
    renderScoreboard(s.players);
  } else if (s.phase === 'roundSummary' || s.phase === 'revealingAnswers') {
    showScreen('screen-summary');
    renderAnswers('sum-ans-list', s.allAnswers, s.revealedAnswers, true);
    document.getElementById('sum-next-msg').textContent = s.isVotingNext ? "PRZYGOTUJ SIĘ NA GŁOSOWANIE!" : "NASTĘPNA RUNDA ZA CHWILĘ...";
  } else if (s.phase === 'voting') {
    showScreen('screen-voting');
    const grid = document.getElementById('vote-grid'); grid.innerHTML = '';
    s.players.filter(p => p.name !== myName).forEach(p => {
      const tile = document.createElement('div'); tile.className = 'vote-tile'; tile.textContent = p.name;
      tile.onclick = () => { socket.emit('vote', { votedName: p.name }); document.querySelectorAll('.vote-tile').forEach(t=>t.classList.remove('selected')); tile.classList.add('selected'); };
      grid.appendChild(tile);
    });
  } else if (s.phase === 'votingResults') {
    showScreen('screen-results');
    const list = document.getElementById('v-res-list'); list.innerHTML = '';
    Object.entries(s.votes || {}).forEach(([voter, voted]) => {
      const change = s.lastVotingChanges[voter] || 0;
      list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333">
        <span><b>${voter}</b> → ${voted}</span>
        <span style="color:${change >= 0 ? 'var(--green)' : 'var(--accent)'}; font-weight:bold">${change > 0 ? '+' : ''}${change} pkt</span>
      </div>`;
    });
  }
});

function renderAnswers(id, all, revealed, isSum = false) {
  const container = document.getElementById(id); container.innerHTML = '';
  if(!all) return;
  all.forEach((ans, i) => {
    const rev = revealed.find(r => r.index === i);
    const tile = document.createElement('div'); tile.className = 'answer-tile' + (rev ? '' : ' hidden');
    tile.innerHTML = `<span>${rev ? ans.text : (isSum ? ans.text : '???')} ${rev && rev.byName !== 'System' ? `<small>(${rev.byName})</small>` : ''}</span><span class="pts">${ans.points}</span>`;
    container.appendChild(tile);
  });
}
function renderScoreboard(players) {
  const list = document.getElementById('pl-list'); list.innerHTML = '';
  [...players].sort((a,b)=>b.score - a.score).forEach(p => {
    list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:5px 0"><span>${p.name}</span><strong>${p.score} pkt</strong></div>`;
  });
}
function sendAns() { socket.emit('submitAnswer', { answer: document.getElementById('ans-in').value }); document.getElementById('ans-in').value = ''; }
socket.on('timerStart', d => { const bar = document.getElementById('timer-bar'); bar.style.transition = 'none'; bar.style.width = '100%'; setTimeout(() => { bar.style.transition = `width ${d.duration}s linear`; bar.style.width = '0%'; }, 50); });
socket.on('votingTimer', d => { document.getElementById('vote-timer').textContent = d.timeLeft; });
</script>
</body>
</html>
